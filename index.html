<!DOCTYPE html>
<html>
<head>
    <title>Gerador de Assinatura</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        form {
            margin-bottom: 20px;
        }

        .signature {
            display: none;
            width: 900px;
            height: 285px;
            margin: auto;
            border: 1px solid #ccc;
            background: #fff;
            box-sizing: border-box;
            overflow: hidden;
        }

        .signature-table {
            width: 900px;
            height: 285px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .signature-table td {
            vertical-align: middle;
            padding: 10px;
        }

        .logo {
            width: 140px;
            height: auto;
        }

        .info {
            text-align: center;
            white-space: nowrap;
        }

        .divider {
            border-left: 3px solid #003366;
            height: 180px;
            width: 10px;
        }

        #sig-nome {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: #003366;
        }

        #sig-cargo {
            margin: 10px 0;
            font-size: 18px;
            color: #555;
        }

        #sig-email {
            color: #003366;
            text-decoration: none;
        }

        .email-line {
            margin-top: 12px;
            font-size: 18px;
        }

        .camara {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #003366;
        }

        .endereco {
            margin: 8px 0;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>

<body>

<h2>Gerador de Assinatura</h2>

<form onsubmit="generateSignature(event)">
    <label>Nome Completo:</label>
    <input type="text" id="nome" required>
    <br><br>

    <label>Cargo:</label>
    <input type="text" id="cargo" required>
    <br><br>

    <label>Email:</label>
    <input type="email" id="email" required>
    <br><br>

    <button type="submit">Gerar Assinatura</button>
</form>

<div class="signature" id="signature">

    <table class="signature-table" id="signature-content">

        <tr>

            <td style="width:170px;text-align:center;">
                <img src="brasao.jpg"
                     alt="Câmara Municipal de Restinga"
                     class="logo">
            </td>

            <td class="info" style="width:320px;">

                <p id="sig-nome">NOME</p>

                <p id="sig-cargo">CARGO</p>

                <p class="email-line">
                    📧
                    <a id="sig-email" href="#">
                        EMAIL
                    </a>
                </p>

            </td>

            <td style="width:20px;">
                <div class="divider"></div>
            </td>

            <td class="info">

                <p class="camara">
                    CÂMARA MUNICIPAL DE RESTINGA
                </p>

                <p class="endereco">
                    📍 R. Cel. Amélio Rosa, 101
                </p>

                <p class="endereco">
                    Restinga - SP, CEP 14430-000
                </p>

                <p class="endereco">
                    Tel: (16) 3143-1168
                </p>

            </td>

        </tr>

    </table>

    <br>

    <button onclick="downloadSignature()">
        Baixar Assinatura
    </button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

function generateSignature(event) {

    event.preventDefault();

    document.getElementById("sig-nome").innerText =
        document.getElementById("nome").value;

    document.getElementById("sig-cargo").innerText =
        document.getElementById("cargo").value;

    document.getElementById("sig-email").innerText =
        document.getElementById("email").value;

    document.getElementById("sig-email").href =
        "mailto:" + document.getElementById("email").value;

    document.getElementById("signature").style.display = "block";
}

function downloadSignature() {
    const signature = document.getElementById("signature-content");

    html2canvas(signature, {
        scale: 1
    }).then(canvas => {
        let link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.download = "assinatura.jpg";
        link.click();
    });
}

</script>

</body>
</html>
